# fly.toml app configuration file generated for aesop-afghanistan on 2026-04-29T21:33:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aesop-afghanistan'
primary_region = 'bom'

[build]

[env]
  BASE_URL = 'https://aesop-afghanistan.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
