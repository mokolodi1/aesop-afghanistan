# fly.toml app configuration file generated for aesop-afghanistan on 2026-02-21T00:00:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "aesop-afghanistan"
primary_region = "iad"

[build]

# Process groups. `app` serves HTTP; `cron` runs the scheduled syncs
# (hourly cache, daily Classroom, daily voice memos) via Supercronic and a
# private on-demand trigger API for the admin panel (scripts/cron-server.js
# + crontab). Both deploy from the same image on `fly deploy`.
# Keep the cron group at exactly one Machine (fly scale count cron=1).
[processes]
  app = "node server.js"
  cron = "node scripts/cron-server.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Keep two Machines running in primary_region (iad) for redundancy.
  min_machines_running = 2
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  processes = ["app"]

# The hourly cache sync needs more headroom (Sheets + Drive mirror).
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
  processes = ["cron"]

[env]
  BASE_URL = "https://aesop-afghanistan.fly.dev"
  DATABASE_AUTO_MIGRATE = "true"
  MIRROR_CACHE_TTL_HOURS = "1"
  REQUEST_LOG = "true"
