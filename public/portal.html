<!DOCTYPE html>
<html lang="en" data-portal-spa="1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AESOP Portal</title>
  <script>
    (function () {
      try {
        if (localStorage.getItem('portalLocale') === 'fa') {
          document.documentElement.lang = 'fa-AF';
          document.documentElement.dir = 'rtl';
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,500;0,700&family=Raleway:ital,wght@0,400;0,500;0,700;1,500;1,700&family=Vazirmatn:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div id="root"></div>
  <script defer src="/app.js"></script>
</body>
</html>
