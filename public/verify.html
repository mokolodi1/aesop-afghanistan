<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying Magic Link - AESOP Afghanistan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="status">Verifying magic link...</h2>
    <div class="message" id="message"></div>
  </div>

  <script>
    // Get token from URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const spinnerEl = document.getElementById('spinner');

    if (!token) {
      statusEl.textContent = 'Invalid Link';
      spinnerEl.style.display = 'none';
      messageEl.className = 'message error';
      messageEl.textContent = 'No token provided. Please check your email link.';
      messageEl.style.display = 'block';
    } else {
      // Validate token format client-side
      if (!/^[a-f0-9]{64}$/i.test(token)) {
        statusEl.textContent = 'Invalid Link';
        spinnerEl.style.display = 'none';
        messageEl.className = 'message error';
        messageEl.textContent = 'Invalid token format.';
        messageEl.style.display = 'block';
      } else {
        // POST token to API for verification
        fetch('/api/verify-magic-link', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ token }),
        })
        .then(response => response.json())
        .then(data => {
          spinnerEl.style.display = 'none';
          
          if (data.success) {
            statusEl.textContent = 'Success!';
            messageEl.className = 'message success';
            messageEl.textContent = 'Magic link verified successfully. Redirecting...';
            messageEl.style.display = 'block';
            
            // TODO: Redirect to edit page with session
            // For now, just show success
            setTimeout(() => {
              // window.location.href = '/edit';
            }, 2000);
          } else {
            statusEl.textContent = 'Verification Failed';
            messageEl.className = 'message error';
            messageEl.textContent = data.error || 'Invalid or expired magic link.';
            messageEl.style.display = 'block';
          }
        })
        .catch(error => {
          spinnerEl.style.display = 'none';
          statusEl.textContent = 'Error';
          messageEl.className = 'message error';
          messageEl.textContent = 'An error occurred verifying the link. Please try again.';
          messageEl.style.display = 'block';
        });
      }
    }
  </script>
</body>
</html>
